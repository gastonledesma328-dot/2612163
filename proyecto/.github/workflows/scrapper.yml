name: Football Embeds Scrapper

on:
  schedule:
    - cron: '0 */2 * * *'   # Cada 2 horas
  workflow_dispatch:          # También permite correrlo manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scrapper
        run: python scripts/scrapper.py

      - name: Commit y push resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add partidos_embeds.json
          git diff --staged --quiet || git commit -m "🤖 Update embeds $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

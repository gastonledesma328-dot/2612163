name: Football Embeds Scrapper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl-cffi

      - name: Run streamed.pk scrapper
        run: python scripts/scrapper.py

      - name: Run streamhdx scrapper
        run: python scripts/scrapper_streamhdx.py

      - name: Commit y push resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add partidos_embeds.json eventos_streamhdx.json
          git diff --staged --quiet || git commit -m "🤖 Update embeds $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
